name: Publish to npm

# Auto-publishes to npm whenever package.json's version changes on main.
# Bump the version + push (or run manually) and it ships. Re-pushing the same
# version is a clean no-op — it only publishes versions that aren't on npm yet.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish if the version is new
        # Skips cleanly when NPM_TOKEN isn't configured, so the workflow never
        # fails just because the secret is missing. Add the NPM_TOKEN repo secret
        # (Settings → Secrets → Actions) to enable auto-publish.
        if: ${{ env.NPM_TOKEN != '' }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          NAME=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VER" version >/dev/null 2>&1; then
            echo "$NAME@$VER already published — nothing to do."
          else
            npm publish --access public
            echo "published $NAME@$VER"
          fi
